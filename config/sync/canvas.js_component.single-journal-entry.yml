js:
  original: |
    import { useState, useEffect } from 'react';
    import useSWR from 'swr';

    import { JsonApiClient, FormattedText, Image } from 'drupal-canvas';

    import { DrupalJsonApiParams } from 'drupal-jsonapi-params';

    import Button from '@/components/utl-button';
    import PageTitle from '@/components/utl-page-title';
    import Amount from '@/components/utl-amount';

    /* --------------------------------------------------
       Drupal JSON:API Client
    -------------------------------------------------- */
    const client = new JsonApiClient()



    export default function JournalEntry() {


      const [jourId, setJourId] = useState('');
      
      useEffect(() => {
        const params = new URLSearchParams(window.location.search);
        const id = params.get('nodeId');
        console.log('Node Id : ',id);
          setJourId(id);
      },[])
      

          /* --------------------------------------------------
           Fetch: Journal Entries
        -------------------------------------------------- */
        
        const isReady =
          jourId !== null && jourId !== undefined && jourId !== '';
        
        const params = new DrupalJsonApiParams()
          .addInclude([
            'field_debit_entry.field_ledger_account_name',
            'field_credit_entry.field_ledger_account_name',
            'field_image_image.field_media_image',
          ]);
        
        if (isReady) {
          params.addFilter('drupal_internal__nid', Number(jourId));
        }
        
        const { data, error, isLoading } = useSWR(
          isReady
            ? [
                'node--journal_entry',
                jourId,
                { queryString: params.getQueryString() },
              ]
            : null,
          ([type, , options]) =>
            client.getCollection(type, options)
        );

        
      /* --------------------------------------------------
         Render States
      -------------------------------------------------- */
      if (error) return 'An error has occurred.';
      if (isLoading) return 'Loading...';

      /* --------------------------------------------------
         Render UI
      -------------------------------------------------- */
      return (
        <div>
          <PageTitle title="Journal Entries" />
          <div></div>

          {/* Actions */}
          <div className="w-full flex justify-end mb-4 gap-2">
            <button onClick={() => window.history.back()}>
                <Button> ← Back </Button>
            </button>

            <a href="/node/add/journal_entry">
              <Button>Create Journal Entry</Button>
            </a>
          </div>

          {/* Journal Entry List */}
          { data?.map((entry) => (
            <div
              key={entry.id}
              className="my-2 py-4 border-b-2 border-slate-500">
              
              <div className='flex justify-between'>
                <div>Date: {entry.field_date}</div>
                <div className='flex gap-2'>
                  <a href={`/node/${entry.drupal_internal__nid}/edit?destination=/admin/content`}><Button>Edit</Button></a>
                  
                </div>
              </div>

              <div className="my-2 mx-4 border-l border-slate-400 pl-4">
                <div className="mt-2 text-xs font-bold uppercase">
                  Description
                </div>
                <FormattedText>
                  {entry?.field_description?.processed}
                </FormattedText>
              </div>

              <div className="my-2 mx-4 border-l border-slate-400 pl-4">
                <div className="mt-2 text-xs font-bold uppercase">
                  Comment
                </div>
                <FormattedText>{entry.field_comment}</FormattedText>
              </div>

              <div>{entry.title}</div>

              <div className="flex flex-wrap md:justify-between my-4">
                {/* Debit */}
                <div>
                  <div className="font-semibold">Debit</div>
                  <div className="mx-4 pl-4 border-l border-slate-400">
                    <div>
                      <a href={`/ledger-account?ledgerId=${entry.field_debit_entry.field_ledger_account_name.id}`}>
                      {
                        entry.field_debit_entry
                          .field_ledger_account_name
                          .field_ledger_account_name
                      }
                      </a>
                    </div>
                    <Amount
                      amt={entry.field_debit_entry.field_debit_amount}
                    />
                  </div>
                </div>

                {/* Credit */}
                <div>
                  <div className="font-semibold">Credit</div>
                  <div className="mx-4 pl-4 border-l border-slate-400">
                    <div>
                      <a href={`/ledger-account?ledgerId=${entry.field_credit_entry.field_ledger_account_name.id}`}>
                      {
                        entry.field_credit_entry
                          .field_ledger_account_name
                          .field_ledger_account_name
                      }
                    </a>
                    </div>
                    <Amount
                      amt={entry.field_credit_entry.field_credit_amount}
                    />
                  </div>
                </div>
              </div>
              <div className='flex'>
                { entry?.field_image_image &&
                  entry?.field_image_image?.map((img) => 
                <a href={img?.field_media_image?.uri?.url} target='_blank'>
                  <Image
                   className='w-64 h-auto p-2 m-2 border border-slate-300'
                   src={img?.field_media_image?.uri?.url}
                   alt='supporting image' 
                   width={1000}
                   height={500}
                   unoptimized />
                </a>
                )
                }
              </div>
            </div>
          ))}
        </div>
      );
    }
