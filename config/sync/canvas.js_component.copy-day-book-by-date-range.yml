  original: |
    import { useState, useEffect } from 'react';
    import useSWR from 'swr';
    import { JsonApiClient } from 'drupal-canvas';
    import { DrupalJsonApiParams } from 'drupal-jsonapi-params';

    import PageTitle from '@/components/utl-page-title';

    /* --------------------------------------------------
       Drupal JSON:API Client
    -------------------------------------------------- */
    const client = new JsonApiClient();


    export default function DayBook() {
      
      
       /* --------------------------------------------------
         State: Date Filters (default = defined fiscal year)
      -------------------------------------------------- */

      const [datePickedFrom, setDatePickedFrom] = useState('');
      const [datePickedTo, setDatePickedTo] = useState('');
      
      const [dateFrom, setDateFrom] = useState('');
      const [dateTo, setDateTo] = useState('');


          /* --------------------------------------------------
               Fetch: Financial Year
            -------------------------------------------------- */
            const { data:fy, error:fyError, isLoading:fyIsLoading } = useSWR(
              [
                'node--financial_year',
                {
                  queryString: new DrupalJsonApiParams()
                    .addSort(['-created'])
                    .getQueryString(),
                },
              ],
              ([type, options]) => client.getCollection(type, options)
            );
          
            
          
             useEffect(() => {
          
               if(datePickedFrom === undefined || datePickedFrom === '' 
                  && datePickedTo === undefined || datePickedTo === '')
               {
                 setDateFrom(fy[0].field_date_from);
                 setDateTo(fy[0].field_date_to);
               }else{
                 setDateFrom(datePickedFrom);
                 setDateTo(datePickedTo);
               }
               
             },[fy])

      

      /* --------------------------------------------------
         Fetch: Journal Entries (filtered by date range)
      -------------------------------------------------- */
      const { data, error, isLoading } = useSWR(
        [
          'node--journal_entry',
          dateFrom,
          dateTo,
          {
            queryString: new DrupalJsonApiParams()
              .addInclude([
                'field_credit_entry.field_ledger_account_name.field_account_type',
                'field_debit_entry.field_ledger_account_name.field_account_type',
              ])
              .addFilter('field_date', dateFrom, '>=')
              .addFilter('field_date', dateTo, '<=')
              .addSort(['-field_date'])
              .getQueryString(),
          },
        ],
        ([type, , , options]) => client.getCollection(type, options)
      );

      /* --------------------------------------------------
         Export filtered data to CSV
      -------------------------------------------------- */
      const exportToCSV = () => {
        if (!data) return;

        const headers = [
          'Date',
          'Title',
          'Debit Ledger Name',
          'Debit Account Type',
          'Debit Amount',
          'Credit Ledger Name',
          'Credit Account Type',
          'Credit Amount',
        ];

        const rows = data.map((entry) => [
          entry.field_date,
          entry.title,
          entry.field_debit_entry.field_ledger_account_name.field_ledger_account_name,
          entry.field_debit_entry.field_ledger_account_name.field_account_type.name,
          entry.field_debit_entry.field_debit_amount,
          entry.field_credit_entry.field_ledger_account_name.field_ledger_account_name,
          entry.field_credit_entry.field_ledger_account_name.field_account_type.name,
          entry.field_credit_entry.field_credit_amount,
        ]);

        const csvContent = [headers, ...rows]
          .map((row) =>
            row
              .map((value) => `"${String(value ?? '').replace(/"/g, '""')}"`)
              .join(',')
          )
          .join('\n');

        const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
        const url = URL.createObjectURL(blob);
        const link = document.createElement('a');
        link.href = url;
        link.download = 'day-book.csv';
        link.click();
        URL.revokeObjectURL(url);
      };

      /* --------------------------------------------------
         Render States
      -------------------------------------------------- */
      if (error) return 'An error has occurred.';
      if (isLoading) return 'Loading...';

      /* --------------------------------------------------
         Render UI
      -------------------------------------------------- */
      return (
        <div>
          {/* Page Header & Export Button */}
          <div className="flex gap-10 items-center mb-4">
            

            <button
              onClick={exportToCSV}
              className="px-4 py-2 bg-black text-white text-sm cursor-pointer"
            >
              Export CSV
            </button>
          </div>

          {/* Date Filter Form */}
          <form
            className="flex gap-4 mb-6 p-4 border rounded"
            onSubmit={(e) => e.preventDefault()}
          >
            <div>
              <label className="block text-sm font-semibold mb-1">Date From</label>
              <input
                type="date"
                value={dateFrom}
                onChange={(e) => setDateFrom(e.target.value)}
                className="border px-2 py-1 rounded"
              />
            </div>

            <div>
              <label className="block text-sm font-semibold mb-1">Date To</label>
              <input
                type="date"
                value={dateTo}
                onChange={(e) => setDateTo(e.target.value)}
                className="border px-2 py-1 rounded"
              />
            </div>
          </form>

          <PageTitle title="Day Book" />

          {/* Table Header */}
          <div>
            <ul className="flex gap-4 text-xs font-bold uppercase">
              <li className="w-28 border-b">Date</li>
              <li className="w-52 border-b">Title</li>
              <li className="w-52 border-b">Debit Ledger Name</li>
              <li className="w-28 border-b">Account Type</li>
              <li className="w-28 border-b">Debit Amount</li>
              <li className="w-52 border-b">Credit Ledger Name</li>
              <li className="w-28 border-b">Account Type</li>
              <li className="w-28 border-b">Credit Amount</li>
              <li className="w-28 border-b">Link to Journal</li>
            </ul>
          </div>

          {/* Journal Entry Rows */}
          {data?.map((entry) => (
            <div key={entry.id} className="flex text-sm gap-4">
              <div className="w-28 border-b text-xs">{entry.field_date}</div>
              <div className="w-52 border-b">{entry.title}</div>
              <div className="w-52 border-b">
                {entry.field_debit_entry.field_ledger_account_name.field_ledger_account_name}
              </div>
              <div className="w-28 border-b">
                {entry.field_debit_entry.field_ledger_account_name.field_account_type.name}
              </div>
              <div className="w-28 border-b">{entry.field_debit_entry.field_debit_amount}</div>
              <div className="w-52 border-b">
                {entry.field_credit_entry.field_ledger_account_name.field_ledger_account_name}
              </div>
              <div className="w-28 border-b">
                {entry.field_credit_entry.field_ledger_account_name.field_account_type.name}
              </div>
              <div className="w-28 border-b">{entry.field_credit_entry.field_credit_amount}</div>
              <div className="py-2 border-b">
                <a className='px-2 border' href={`/journal-entry/?nodeId=${entry.drupal_internal__nid}`}>
                JRN</a>
              </div>
            </div>
          ))}
        </div>
      );
    }
